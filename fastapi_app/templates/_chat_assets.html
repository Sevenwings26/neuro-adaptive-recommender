
<!-- marked.js — lightweight markdown renderer, no build step needed -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
  /* ── Chat drawer ─────────────────────────────────────────────────── */
  :root {
    --chat-w:      380px;
    --chat-bg:     #ffffff;
    --chat-border: #e0e8f0;
    --user-bubble: #0d7a6e;
    --ai-bubble:   #f0f4f8;
    --ai-text:     #1a2530;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --chat-bg:     #1a2230;
      --chat-border: #2a3848;
      --ai-bubble:   #232f40;
      --ai-text:     #c8d8e8;
    }
  }
  [data-theme="dark"] {
    --chat-bg:     #1a2230;
    --chat-border: #2a3848;
    --ai-bubble:   #232f40;
    --ai-text:     #c8d8e8;
  }

  body.chat-open { padding-right: var(--chat-w); }

  .chat-drawer {
    position: fixed; top: 0; right: 0;
    width: var(--chat-w); height: 100vh;
    background: var(--chat-bg);
    border-left: 1px solid var(--chat-border);
    box-shadow: -4px 0 24px rgba(0,0,0,0.13);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    z-index: 300;
  }
  .chat-drawer.open { transform: translateX(0); }

  .chat-header {
    padding: 0.9rem 1.1rem;
    border-bottom: 1px solid var(--chat-border);
    background: var(--ink, #0f1923); color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .chat-header-title { font-family: var(--serif,'Georgia'); font-size: 1rem; font-weight: 600; color: #5ecfc5; }
  .chat-header-sub   { font-size: 0.7rem; color: #8fa4b0; margin-top: 0.1rem; }
  .btn-close-chat    { background:none; border:none; color:#8fa4b0; cursor:pointer; font-size:1.15rem; padding:0.2rem; transition:color 0.15s; }
  .btn-close-chat:hover { color:#fff; }

  .chat-context {
    padding: 0.55rem 1rem;
    font-size: 0.71rem; font-family: var(--mono,'monospace');
    line-height: 1.5; flex-shrink: 0;
    border-bottom: 1px solid var(--chat-border);
  }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 1rem;
    display: flex; flex-direction: column; gap: 0.7rem;
    scroll-behavior: smooth;
  }

  .msg { display:flex; flex-direction:column; max-width:90%; }
  .msg.user  { align-self:flex-end;   align-items:flex-end; }
  .msg.ai    { align-self:flex-start; align-items:flex-start; }
  .msg-time  { font-size:0.63rem; color:var(--ink-soft,'#667'); margin-top:0.18rem; }

  .msg-bubble {
    padding: 0.6rem 0.85rem;
    border-radius: 14px;
    font-size: 0.84rem; line-height: 1.65;
  }
  .msg.user .msg-bubble {
    background: var(--user-bubble); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.ai .msg-bubble {
    background: var(--ai-bubble); color: var(--ai-text);
    border-bottom-left-radius: 4px;
  }

  /* ── Markdown inside AI bubble ──────────────────────────────────── */
  .msg.ai .msg-bubble p          { margin: 0 0 0.5rem; }
  .msg.ai .msg-bubble p:last-child { margin-bottom: 0; }
  .msg.ai .msg-bubble strong     { color: var(--teal, #0d7a6e); font-weight: 600; }
  .msg.ai .msg-bubble em         { font-style: italic; }
  .msg.ai .msg-bubble ul,
  .msg.ai .msg-bubble ol         { padding-left: 1.2rem; margin: 0.35rem 0 0.5rem; }
  .msg.ai .msg-bubble li         { margin-bottom: 0.25rem; font-size: 0.82rem; }
  .msg.ai .msg-bubble h1,
  .msg.ai .msg-bubble h2,
  .msg.ai .msg-bubble h3         { font-size: 0.88rem; font-weight: 600; margin: 0.5rem 0 0.2rem; color: var(--teal, #0d7a6e); }
  .msg.ai .msg-bubble code       { background: rgba(0,0,0,0.07); border-radius:3px; padding:0.1rem 0.35rem; font-size:0.78rem; }
  .msg.ai .msg-bubble a          { color: var(--teal, #0d7a6e); }

  /* ── Typing dots ────────────────────────────────────────────────── */
  .typing-indicator .msg-bubble  { display:flex; gap:5px; align-items:center; padding:0.7rem 0.9rem; }
  .typing-dot {
    width:7px; height:7px; border-radius:50%;
    background: var(--ink-soft,'#8fa4b0');
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay:.2s; }
  .typing-dot:nth-child(3) { animation-delay:.4s; }
  @keyframes typingBounce {
    0%,80%,100% { transform:translateY(0); }
    40%          { transform:translateY(-6px); }
  }

  /* ── Suggestions ────────────────────────────────────────────────── */
  .chat-suggestions {
    padding: 0.5rem 0.9rem; flex-shrink: 0;
    border-top: 1px solid var(--chat-border);
    display: flex; flex-direction: column; gap: 0.38rem;
  }
  .chat-suggestions p { font-size:0.68rem; color:var(--ink-soft,'#667'); margin-bottom:0.15rem; }
  .suggestion-btn {
    font-size:0.74rem; text-align:left;
    background: var(--teal-lt,'#e0f4f2'); color: var(--teal,'#0d7a6e');
    border: 1px solid var(--teal,'#0d7a6e'); border-radius:6px;
    padding:0.32rem 0.6rem; cursor:pointer;
    transition: background 0.15s; font-family: var(--sans,'sans-serif'); line-height:1.4;
  }
  .suggestion-btn:hover { background: var(--teal,'#0d7a6e'); color:#fff; }

  /* ── Input row ──────────────────────────────────────────────────── */
  .chat-input-row {
    padding: 0.75rem 0.9rem;
    border-top: 1px solid var(--chat-border);
    display: flex; gap: 0.45rem; align-items: flex-end; flex-shrink: 0;
  }
  .chat-input {
    flex:1; font-family: var(--sans,'sans-serif'); font-size:0.84rem;
    padding: 0.55rem 0.8rem; border: 1px solid var(--chat-border);
    border-radius:8px; resize:none; outline:none;
    background: var(--paper,'#f7f4ee'); color: var(--ink,'#0f1923');
    min-height:38px; max-height:110px; line-height:1.5;
    transition: border-color 0.15s;
  }
  .chat-input:focus { border-color: var(--teal,'#0d7a6e'); }
  .btn-send {
    background: var(--teal,'#0d7a6e'); color:#fff; border:none;
    border-radius:8px; padding:0.55rem 0.85rem;
    cursor:pointer; font-size:1rem; transition:background 0.15s; flex-shrink:0;
  }
  .btn-send:hover    { background: #0a5f55; }
  .btn-send:disabled { background: var(--border,'#ccc'); cursor:not-allowed; }

  .chat-unavail {
    padding:2rem 1.25rem; text-align:center;
    color:var(--ink-soft,'#667'); font-size:0.84rem; line-height:1.7;
  }

  /* ── Navbar chat button ─────────────────────────────────────────── */
  .btn-chat-toggle {
    font-family: var(--mono,'monospace'); font-size:0.74rem;
    background: var(--teal,'#0d7a6e'); color:#fff;
    border:none; padding:0.32rem 0.85rem; border-radius:6px;
    cursor:pointer; display:flex; align-items:center; gap:0.4rem;
    transition:background 0.2s; white-space:nowrap;
  }
  .btn-chat-toggle:hover { background:#0a5f55; }
  .btn-chat-toggle .dot {
    width:7px; height:7px; border-radius:50%; background:#7fffcc;
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  @media (max-width:640px) {
    :root { --chat-w: 100vw; }
    body.chat-open { padding-right: 0; }
  }
</style>

<script>
  // ── Injected by the including page ───────────────────────────────
  // const SCREENING_CONTEXT = { … };   (defined before this include)
  // const IS_RESULTS_PAGE   = true/false;

  let chatHistory = [];
  let chatOpen    = false;

  // Configure marked.js — safe render, no extra wrapping
  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: true, gfm: true });
  }

  // ── Toggle drawer ─────────────────────────────────────────────────
  function toggleChat() {
    chatOpen = !chatOpen;
    const drawer = document.getElementById('chatDrawer');
    drawer.classList.toggle('open', chatOpen);
    document.body.classList.toggle('chat-open', chatOpen);
    // Update all toggle buttons (there may be one in navbar + one elsewhere)
    document.querySelectorAll('.btn-chat-toggle').forEach(btn => {
      btn.innerHTML = chatOpen
        ? '✕ Close chat'
        : '<span class="dot"></span> Ask Nora AI';
    });
    if (chatOpen) {
      setTimeout(() => document.getElementById('chatInput')?.focus(), 340);
    }
  }

  // ── Suggested question ────────────────────────────────────────────
  function sendSuggestion(text) {
    const suggestions = document.getElementById('chatSuggestions');
    if (suggestions) suggestions.style.display = 'none';
    sendMessage(text);
  }

  // ── Textarea auto-resize ──────────────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
  }

  // ── Enter = send, Shift+Enter = newline ───────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  // ── Core send ─────────────────────────────────────────────────────
  async function sendMessage(overrideText) {
    const input = document.getElementById('chatInput');
    const text  = overrideText || (input ? input.value.trim() : '');
    if (!text) return;

    if (input && !overrideText) { input.value = ''; input.style.height = 'auto'; }
    const suggestions = document.getElementById('chatSuggestions');
    if (suggestions) suggestions.style.display = 'none';

    appendMessage('user', text);
    const typingId = appendTyping();

    const sendBtn = document.getElementById('sendBtn');
    if (sendBtn) sendBtn.disabled = true;

    try {
      const res = await fetch('/chat', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({
          screening_context: SCREENING_CONTEXT,
          history          : chatHistory,
          message          : text,
        }),
      });

      removeTyping(typingId);

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
        appendMessage('ai', `⚠️ ${err.detail || 'Something went wrong. Please try again.'}`);
        return;
      }

      const data = await res.json();

      // Client owns conversation history — stateless backend
      chatHistory.push({ role: 'user',      content: text });
      chatHistory.push({ role: 'assistant', content: data.reply });
      if (chatHistory.length > 40) chatHistory = chatHistory.slice(-40);

      // Render with markdown
      appendMessage('ai', data.reply, true);

    } catch (err) {
      removeTyping(typingId);
      appendMessage('ai', '⚠️ Network error — please check your connection and try again.');
    } finally {
      if (sendBtn) sendBtn.disabled = false;
      if (input) input.focus();
    }
  }

  // ── DOM helpers ───────────────────────────────────────────────────
  function appendMessage(role, text, renderMarkdown = false) {
    const container = document.getElementById('chatMessages');
    const now = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    let content;
    if (renderMarkdown && typeof marked !== 'undefined') {
      // marked.parse returns safe HTML — bold, lists, links all render correctly
      content = marked.parse(text);
    } else {
      // Plain text fallback — escape and preserve line breaks
      content = text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\n/g,'<br>');
    }

    div.innerHTML = `
      <div class="msg-bubble">${content}</div>
      <span class="msg-time">${now}</span>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  let _typingCounter = 0;
  function appendTyping() {
    const id = 'typing-' + (++_typingCounter);
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'msg ai typing-indicator';
    div.id = id;
    div.innerHTML = `
      <div class="msg-bubble">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    document.getElementById(id)?.remove();
  }
</script>
